services:
  gateway:
    image: nginx:1.27-alpine
    container_name: moka_solar_gateway
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/moka-solar.public.conf:/etc/nginx/conf.d/default.conf:ro

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: moka_solar_tunnel
    restart: unless-stopped
    depends_on:
      - gateway
    command: tunnel --no-autoupdate --url http://gateway:80
