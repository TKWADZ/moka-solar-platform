name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            ~/deploy.sh
            REDEPLOY_DONE=0
            PROJECT_DIRS=""
            INSPECT_DIR=""
            INSPECT_CONFIG_FILES=""

            if command -v docker >/dev/null 2>&1 && docker ps -a --format '{{.Names}}' | grep -q '^moka_solar_backend$'; then
              INSPECT_DIR="$(docker inspect -f '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' moka_solar_backend 2>/dev/null || true)"
              INSPECT_CONFIG_FILES="$(docker inspect -f '{{ index .Config.Labels "com.docker.compose.project.config_files" }}' moka_solar_backend 2>/dev/null || true)"
              if [ -n "$INSPECT_DIR" ]; then
                PROJECT_DIRS="$INSPECT_DIR"
              fi
            fi

            if [ -z "$PROJECT_DIRS" ]; then
              PROJECT_DIRS="$(find "$HOME" /opt /srv /var/www -maxdepth 7 -type f \( -name 'docker-compose.prod.yml' -o -name 'docker-compose.yml' -o -name 'compose.yml' -o -name 'compose.yaml' \) 2>/dev/null | sed -E 's|/(docker-compose\.prod\.yml|docker-compose\.yml|compose\.yml|compose\.yaml)$||' | sort -u)"
            fi

            for dir in $PROJECT_DIRS; do
              if [ ! -d "$dir" ]; then
                continue
              fi

              COMPOSE_ARGS=""
              if [ "$dir" = "$INSPECT_DIR" ] && [ -n "$INSPECT_CONFIG_FILES" ]; then
                OLD_IFS="$IFS"
                IFS=','
                for cfg in $INSPECT_CONFIG_FILES; do
                  case "$cfg" in
                    /*) cfg_path="$cfg" ;;
                    *) cfg_path="$dir/$cfg" ;;
                  esac
                  if [ -f "$cfg_path" ]; then
                    COMPOSE_ARGS="$COMPOSE_ARGS -f $cfg_path"
                  fi
                done
                IFS="$OLD_IFS"
              fi

              if [ -z "$COMPOSE_ARGS" ]; then
                for candidate in docker-compose.prod.yml docker-compose.yml compose.yml compose.yaml; do
                  if [ -f "$dir/$candidate" ]; then
                    COMPOSE_ARGS="$COMPOSE_ARGS -f $dir/$candidate"
                  fi
                done
              fi

              if [ -z "$COMPOSE_ARGS" ]; then
                continue
              fi

              if [ "$dir" != "$INSPECT_DIR" ] && ! (cd "$dir" && docker compose --project-directory "$dir" $COMPOSE_ARGS config --services 2>/dev/null | grep -q '^backend$'); then
                continue
              fi

              echo "Rebuilding compose stack in $dir with:$COMPOSE_ARGS"
              (
                cd "$dir" && \
                if [ -d ".git" ]; then \
                  git fetch origin main && \
                  git checkout main && \
                  git pull --ff-only origin main; \
                fi && \
                docker compose --project-directory "$dir" $COMPOSE_ARGS build backend frontend && \
                docker compose --project-directory "$dir" $COMPOSE_ARGS up -d backend frontend && \
                docker exec moka_solar_backend sh -lc "cd /app && npx prisma migrate deploy"
              ) && REDEPLOY_DONE=1 && break
            done

            if [ "$REDEPLOY_DONE" -ne 1 ]; then
              echo "Could not locate production compose stack for moka_solar_backend"
              exit 1
            fi

            SUDO=""
            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            fi

            NGINX_FIX_APPLIED=0
            for dir in /etc/nginx/sites-enabled /etc/nginx/sites-available /etc/nginx/conf.d; do
              if [ ! -d "$dir" ]; then
                continue
              fi

              files="$($SUDO grep -RIl 'proxy_pass http://127.0.0.1:4000/;' "$dir" 2>/dev/null || true)"

              if [ -z "$files" ]; then
                continue
              fi

              echo "$files" | while IFS= read -r file; do
                if [ -n "$file" ]; then
                  $SUDO sed -i 's|proxy_pass http://127.0.0.1:4000/;|proxy_pass http://127.0.0.1:4000;|g' "$file"
                fi
              done

              NGINX_FIX_APPLIED=1
            done

            if [ "$NGINX_FIX_APPLIED" -eq 1 ]; then
              $SUDO nginx -t
              ($SUDO systemctl reload nginx || $SUDO service nginx reload || $SUDO nginx -s reload)
            fi

            python3 - <<'PY'
            from pathlib import Path

            redirect_line = "    if ($host = www.mokasolar.com) {\n        return 301 https://mokasolar.com$request_uri;\n    }\n"
            candidates = []
            for root in ("/etc/nginx/sites-enabled", "/etc/nginx/sites-available", "/etc/nginx/conf.d"):
                path = Path(root)
                if not path.exists():
                    continue
                candidates.extend([item for item in path.rglob("*") if item.is_file()])

            for file_path in candidates:
                try:
                    text = file_path.read_text()
                except Exception:
                    continue

                if "mokasolar.com" not in text:
                    continue

                if "www.mokasolar.com" in text and "return 301 https://mokasolar.com$request_uri;" in text:
                    continue

                updated = text.replace(
                    "server_name mokasolar.com www.mokasolar.com;\n",
                    "server_name mokasolar.com www.mokasolar.com;\n" + redirect_line,
                )

                updated = updated.replace(
                    "server_name www.mokasolar.com mokasolar.com;\n",
                    "server_name www.mokasolar.com mokasolar.com;\n" + redirect_line,
                )

                if updated != text:
                    file_path.write_text(updated)
            PY

            $SUDO nginx -t
            ($SUDO systemctl reload nginx || $SUDO service nginx reload || $SUDO nginx -s reload)

            if command -v docker >/dev/null 2>&1 && docker ps --format '{{.Names}}' | grep -q '^moka_solar_backend$'; then
              docker exec moka_solar_backend sh -lc "cd /app && BOOTSTRAP_ADMIN_EMAIL=admin@mokasolar.com BOOTSTRAP_ADMIN_PASSWORD=123456 BOOTSTRAP_ADMIN_NAME='Moka Solar Admin' npm run admin:reset"
            fi

            if ! command -v docker >/dev/null 2>&1 || ! docker ps --format '{{.Names}}' | grep -q '^moka_solar_backend$'; then
              BACKEND_DIRS="$(find "$HOME" -maxdepth 5 -type f \( -path '*/backend/package.json' -o -path '*/dist/src/admin-reset.js' -o -path '*/src/admin-reset.ts' \) 2>/dev/null | sed -e 's|/package.json$||' -e 's|/dist/src/admin-reset.js$||' -e 's|/src/admin-reset.ts$||' | sort -u)"

              RESET_DONE=0
              for dir in $BACKEND_DIRS; do
                if [ ! -d "$dir" ]; then
                  continue
                fi

                if [ -f "$dir/dist/src/admin-reset.js" ]; then
                  (
                    cd "$dir" && \
                    BOOTSTRAP_ADMIN_EMAIL=admin@mokasolar.com \
                    BOOTSTRAP_ADMIN_PASSWORD=123456 \
                    BOOTSTRAP_ADMIN_NAME='Moka Solar Admin' \
                    npm run admin:reset
                  ) && RESET_DONE=1 && break
                fi

                if [ -f "$dir/src/admin-reset.ts" ] && command -v npx >/dev/null 2>&1; then
                  (
                    cd "$dir" && \
                    BOOTSTRAP_ADMIN_EMAIL=admin@mokasolar.com \
                    BOOTSTRAP_ADMIN_PASSWORD=123456 \
                    BOOTSTRAP_ADMIN_NAME='Moka Solar Admin' \
                    npx ts-node src/admin-reset.ts
                  ) && RESET_DONE=1 && break
                fi
              done

              if [ "$RESET_DONE" -ne 1 ]; then
                echo "Could not locate backend to reset admin account"
              fi
            fi
