name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            ~/deploy.sh
            SUDO=""
            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            fi

            NGINX_FIX_APPLIED=0
            for dir in /etc/nginx/sites-enabled /etc/nginx/sites-available /etc/nginx/conf.d; do
              if [ ! -d "$dir" ]; then
                continue
              fi

              files="$($SUDO grep -RIl 'proxy_pass http://127.0.0.1:4000/;' "$dir" 2>/dev/null || true)"

              if [ -z "$files" ]; then
                continue
              fi

              echo "$files" | while IFS= read -r file; do
                if [ -n "$file" ]; then
                  $SUDO sed -i 's|proxy_pass http://127.0.0.1:4000/;|proxy_pass http://127.0.0.1:4000;|g' "$file"
                fi
              done

              NGINX_FIX_APPLIED=1
            done

            if [ "$NGINX_FIX_APPLIED" -eq 1 ]; then
              $SUDO nginx -t
              ($SUDO systemctl reload nginx || $SUDO service nginx reload || $SUDO nginx -s reload)
            fi
